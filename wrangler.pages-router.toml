binding = "BACKEND"
service = "winerim-proxy"

[vars]
FRONTEND_ORIGIN = "https://782dc9c7.winerim-origin.pages.dev"
FRONTEND_RELEASE = "782dc9c7-presentation-cloudrim-deck-r6"
