<!DOCTYPE html>
<html><head><title>Screenshots</title><style>body{background:#111;color:#fff;font-family:sans-serif;padding:20px}img{max-width:400px;margin:10px;border:1px solid #333}div{display:inline-block;text-align:center;margin:10px;vertical-align:top}p{margin:4px}</style></head><body>
<script>
for(let i=1;i<=20;i++){
  const n=String(i).padStart(2,'0');
  document.write(`<div><img src="/src/assets/screenshots/ss-${n}.png" onerror="this.style.border='2px solid red'"/><p>ss-${n}</p></div>`);
}
</script>
</body></html>
